<script>
  // REIWA MAKER LOGIC
  const rStartBtn = document.getElementById('reiwa-start-btn');
  const rBar = document.getElementById('reiwa-bar');
  const rOverlay = document.getElementById('reiwa-progress-overlay');
  const h2Percent = document.getElementById('h2-percent');
  const rCore = document.getElementById('hydrogen-core');
  const rCoreVfx = document.getElementById('core-vfx');

  let rProgress = 0;
  let isReiwaCharging = false;

  if (rStartBtn) {
    rStartBtn.onclick = () => {
      if (isReiwaCharging) return;

      try {
        if (document.documentElement.requestFullscreen) {
          document.documentElement.requestFullscreen().catch(() => { });
        }
      } catch (e) { }

      isReiwaCharging = true;
      rStartBtn.disabled = true;
      rStartBtn.innerHTML = '<i class="fas fa-sync fa-spin"></i> 同調中...';

      const s1Led = document.getElementById('step-1-led');
      s1Led.classList.replace('bg-slate-700', 'bg-green-500');
      s1Led.classList.add('shadow-[0_0_8px_rgba(34,197,94,0.8)]');

      if (navigator.vibrate) {
        const vibrateLoop = () => {
          if (!isReiwaCharging) return;
          navigator.vibrate([100, 100, 300, 100, 100, 100, 500, 200]);
          setTimeout(vibrateLoop, 1700);
        };
        vibrateLoop();
      }

      const rInterval = setInterval(() => {
        if (rProgress < 100) {
          rProgress += Math.random() * 0.8;
          if (rProgress > 100) rProgress = 100;

          rBar.style.width = rProgress + '%';
          rOverlay.style.height = rProgress + '%';
          h2Percent.innerText = rProgress.toFixed(3) + '%';

          if (rProgress > 50) {
            const s2Led = document.getElementById('step-2-led');
            s2Led.classList.replace('bg-slate-700', 'bg-green-500');
            s2Led.classList.add('shadow-[0_0_8px_rgba(34,197,94,0.8)]');
          }

          rCore.style.transform = `translate(${(Math.random() - 0.5) * 5}px, ${(Math.random() - 0.5) * 5}px)`;
          document.getElementById('cpu-val').innerText = (Math.random() * 10 + 20).toFixed(1);
          document.getElementById('sync-val').innerText = (99.9 - Math.random() * 0.5).toFixed(1);

        } else {
          clearInterval(rInterval);
          completeReiwaCharge();
        }
      }, 50);
    };
  }

  function completeReiwaCharge() {
    isReiwaCharging = false;
    rStartBtn.disabled = false;
    rStartBtn.innerHTML = '<i class="fas fa-check-circle"></i> 令和最新・チャージ完了';
    rStartBtn.classList.replace('bg-sky-500', 'bg-green-500');

    rCoreVfx.style.opacity = '1';
    setTimeout(() => { rCoreVfx.style.opacity = '0'; }, 200);

    rCore.style.transform = 'scale(1.2)';
    rCore.style.boxShadow = '0 0 120px rgba(255, 255, 255, 1)';

    if (navigator.vibrate) navigator.vibrate([500, 100, 500]);

    setTimeout(() => {
      rCore.style.transform = 'scale(1)';
      rCore.style.boxShadow = '';
      alert('令和最新版の水素チャージが完了しました。宇宙のエネルギーがあなたのデバイスに満ち溢れています。');
    }, 1000);
  }
</script>
